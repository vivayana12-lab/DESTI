<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESTI | Твій Шлях</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF00FF; --bg: #000000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; height: 100%; }
        
        #orb { 
            position: fixed; width: 600px; height: 600px; 
            background: radial-gradient(circle, rgba(255, 0, 255, 0.4) 0%, rgba(255, 0, 255, 0.1) 45%, rgba(0,0,0,0) 70%); 
            border-radius: 50%; filter: blur(60px); z-index: 1; pointer-events: none; 
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .orb-breathing { animation: breathe 7s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; } }

        .logo { position: fixed; top: 30px; left: 50px; font-size: 32px; font-weight: 800; color: var(--accent); text-shadow: 0 0 15px var(--accent); letter-spacing: 8px; z-index: 100; }
        .main-container { max-width: 800px; margin: 0 auto; padding: 15vh 20px; position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        
        .question-text { font-size: 22px; line-height: 1.6; text-align: center; margin-bottom: 40px; min-height: 100px; width: 100%; }
        .feedback-text { color: var(--accent); font-style: italic; text-align: center; font-size: 20px; margin-top: 20px; animation: fadeIn 0.8s; width: 100%; }
        
        .options-container { display: flex; flex-direction: column; align-items: flex-start; width: 100%; max-width: 650px; }
        button { 
            background: linear-gradient(145deg, #FF00FF, #8B008B); color: white; border: none; 
            padding: 18px 25px; border-radius: 12px; font-size: 16px; font-weight: 600; 
            margin-bottom: 15px; cursor: pointer; transition: 0.5s; text-align: left; width: auto; 
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.2); font-family: 'Montserrat', sans-serif;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--accent); }

        .final-frame { border: 2px solid var(--accent); padding: 40px; border-radius: 35px; background: rgba(255, 0, 255, 0.04); box-shadow: 0 0 45px rgba(255, 0, 255, 0.3); width: 100%; box-sizing: border-box; }
        .res-card { background: rgba(255,255,255,0.06); padding: 20px; border-radius: 18px; margin-bottom: 15px; cursor: pointer; border: 1px solid transparent; transition: 0.5s; }
        .res-card:hover { border-color: var(--accent); }
        .details { display: none; margin-top: 15px; font-size: 14px; line-height: 1.6; border-top: 1px solid rgba(255,0,255,0.2); padding-top: 12px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .arrow { transition: transform 0.3s; color: var(--accent); font-size: 18px; margin-left: 10px; }
        .res-card.active .arrow { transform: rotate(180deg); }
        
        #feedback-popup {
            position: fixed; top: 30px; right: -400px; width: 300px; 
            background: rgba(255, 0, 255, 0.15); border: 1px solid var(--accent); 
            backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; 
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4); z-index: 1000; 
            transition: right 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 14px; line-height: 1.4;
        }
        #feedback-popup.show { right: 30px; }
        #feedback-popup a { color: white; font-weight: 800; text-decoration: underline; display: block; margin-top: 10px; }

        /* --- МОБІЛЬНА АДАПТАЦІЯ --- */
        @media (max-width: 768px) {
            .logo { left: 20px; top: 20px; font-size: 24px; letter-spacing: 4px; }
            .main-container { padding: 12vh 15px; }
            .question-text { font-size: 18px; margin-bottom: 30px; }
            button { width: 100%; padding: 15px 20px; font-size: 15px; }
            .final-frame { padding: 20px; border-radius: 20px; }
            .res-card { padding: 15px; }
            #orb { width: 300px; height: 300px; }
            #feedback-popup { width: calc(100% - 60px); right: -110%; }
            #feedback-popup.show { right: 30px; left: 30px; width: auto; }
        }
    </style>
</head>

            { id: 'design_1', text: "Уяви, що у молодіжному центрі стартує проєкт на тему «Дослідження вживання зросійщених словосполучень у соціальних мережах». Тебе запросили долучитися до команди. Яку роль ти обереш? З чого ти розпочнеш свою участь у проєкті?", options: [

                { t: "А: Відповідальність за цифри та грошові стратегії.", s: { "Економіка": 3 } },
                { t: "Б: Відповідальність за долі людей та їхні вчинки.", s: { "Юриспруденція": 3 } },
                { t: "В: Тема не викликає глибокої зацікавленості.", s: {} }
            ]},
            { text: "Уяви, що ти керуєш важливою зустріччю чи уроком. Що для тебе буде справжнім показником успіху в кінці дня?", options: [
                { t: "А: Те, що ця група вчасно і якісно виконала складне завдання.", s: { "Менеджмент": 3 } },
                { t: "Б: Те, що кожна людина в цій групі навчилася чомусь новому і стала кращою.", s: { "Освіта": 3 } },
                { t: "В: Тема не викликає глибокої зацікавленості.", s: {} }
            ]},
            { text: "Що тобі ближче:", options: [
                { t: "А: Створювати чітку структуру роботи та зони відповідальності.", s: { "Менеджмент": 3 } },
                { t: "Б: Шукати унікальні способи пояснення складних речей.", s: { "Освіта": 3 } },
                { t: "В: Тема не викликає глибокої зацікавленості.", s: {} }
            ]},
            { text: "Уяви, що людина припустилася помилки. Твоя природна реакція:", options: [
                { t: "А: Дати чітку інструкцію для виправлення, щоб не гальмувати загальний процес.", s: { "Менеджмент": 3 } },
                { t: "Б: Допомогти людині самій зрозуміти причину помилки.", s: { "Освіта": 3 } },
                { t: "В: Тема не викликає глибокої зацікавленості.", s: {} }
            ]},
            { text: "Уяви дві ситуації: перша, ти співпрацюєш із людиною, яка системно помиляється... Яка для тебе була б легшою у здійсненні?", options: [
                { t: "А: Здійснення звільнення заради результату команди.", s: { "Менеджмент": 3 } },
                { t: "Б: Продовжувати пояснювати, поки людина не засвоїть матеріал.", s: { "Освіта": 3 } },
                { t: "В: Тема не викликає глибокої зацікавленості.", s: {} }
            ]},
            { text: "Уяви, що ти в компанії друзів. Ти помічаєш, що після певної фрази хтось один різко змінився в обличчі або став мовчазним, хоча інші цього не зауважили. Чи виникне у тебе автоматичне бажання проаналізувати, що саме його бентежить і спробувати обережно повернути людині комфортний стан?", options: [
                { t: "А: Так, мене б це щиро зацікавило та занепокоїло.", s: { "Психологія": 3 } },
                { t: "Б: Напевно, ні. Я можу просто цього не помітити.", s: {} }
            ]},
            { text: "Тобі подобається розбиратися в ситуаціях, де немає \"правильної\" чи \"неправильної\" сторони, а результат залежить від твоєї здатності відчути тонкі налаштування характеру іншої людини?", options: [
                { t: "А: О так! Це надзвичайно захопливо і важливо для мене.", s: { "Психологія": 3 } },
                { t: "Б: Я б не хотів/ла бути пов'язана з цим на постійній основі.", s: {} }
            ]},
            { text: "Чи готовий/а ти до діяльності, де твій головний інструмент — це слухання?", options: [
                { t: "А: Так, я усвідомлюю складність, але відчуваю в собі сили.", s: { "Психологія": 3 } },
                { t: "Б: Я б не хотів/ла бути пов'язана з цим на постійній основі.", s: {} }
            ]},
            { text: "Уяви, що за кожною живою історією стоїть необхідність вести суху звітність... Чи не відштовхує тебе необхідність поєднувати спілкування з паперовою роботою?", options: [
                { t: "А: Це частина професії, і я готова бути залученою повністю.", s: { "Психологія": 3 } },
                { t: "Б: Я б не хотів/ла бути пов'язана з цим на постійній основі.", s: {} }
            ]}
        ];

        let questions = [];
        let currentStep = -1;
        let scores = { "IT": 0, "Інженерія": 0, "Освіта": 0, "Юриспруденція": 0, "Економіка": 0, "Дизайн": 0, "Медицина": 0, "Психологія": 0, "Філологія": 0, "Менеджмент": 0 };

        function initQuiz() {
            const shuffledRandom = randomPool.sort(() => Math.random() - 0.5);
            questions = [
                { text: "Проєкт у Молодіжному центрі на межі провалу через серйозну помилку. Твоя роль:", options: [
                    { t: "А: \"Заспокойтеся, все вирішимо!\" — беру емоції під контроль та заспокоюю команду.", s: { "Освіта": 8, "Менеджмент": 8, "Психологія": 8 }, f: "О, ти — той самий 'соціальний клей'. Поки всі бігають по стелі, ти тримаєш штурвал емоцій." },
                    { t: "Б: \"Десь тут є логічна дірка...\" — перевіряю розрахунки та шукаю технічну причину.", s: { "Економіка": 8, "Юриспруденція": 8, "IT": 8, "Інженерія": 8 }, f: "Холодний розум у вогні — це потужно. Світ розрахунків та алгоритмів точно тебе зачекає." },
                    { t: "В: \"Не зупиняємось, є інший шлях!\" — генерую нові ідеї попри факап.", s: { "Дизайн": 8, "Філологія": 8, "Медицина": 8 }, f: "Круто! Ти не даєш обставинам поставити крапку. Будь-який факап стає просто новим поворотом сюжету." }
                ]},
                ...shuffledRandom,
                ...staticQuestions
            ];
        }

        const app = document.getElementById('app');
        const orb = document.getElementById('orb');

        function render() {
            app.innerHTML = '';
            if (currentStep === -1) showWelcome();
            else if (currentStep === -2) showBackground();
            else if (currentStep < questions.length) showQuestion();
            else showResult();
        }

        function showWelcome() {
            app.innerHTML = `
                <h1 style="font-size: clamp(35px, 8vw, 65px); text-align: center; margin-bottom: 20px;">Яка ж вона, твоя професія?</h1>
                <p style="text-align: center; opacity: 0.8; font-size: 19px; margin-bottom: 45px;">Готовий/ва дізнатися? Якщо так, тисни на кнопку.</p>
                <button onclick="initQuiz(); currentStep = -2; render();" style="align-self: center;">Готовий</button>
            `;
        }

        function showBackground() {
            app.innerHTML = `
                <div class="question-text">
                Уяви, що ти є постійним учасником молодіжного клубу. Зараз він розширює свої повноваження, тому проєктів достатньо як і роботи. Твоє завдання — відповідати на запитання чесно. Домовились?)
                </div>
                <button onclick="currentStep = 0; render();" style="align-self: center;">Let’s go</button>
            `;
        }

        function showQuestion() {
            const q = questions[currentStep];
            const qDiv = document.createElement('div');
            qDiv.className = 'question-text';
            app.appendChild(qDiv);

            let i = 0;
            function type() {
                if (i < q.text.length) {
                    qDiv.innerHTML += q.text.charAt(i);
                    i++; setTimeout(type, 15);
                } else showOptions(q);
            }
            type();
        }

        function showOptions(q) {
            const container = document.createElement('div');
            container.className = 'options-container';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.t;
                btn.onclick = () => {
                    for (let s in opt.s) scores[s] += opt.s[s];
                    app.innerHTML = '';
                    if (opt.f) {
                        const fb = document.createElement('div');
                        fb.className = 'feedback-text';
                        fb.innerText = opt.f;
                        app.appendChild(fb);
                        setTimeout(() => { currentStep++; render(); }, 3500);
                    } else { currentStep++; render(); }
                };
                container.appendChild(btn);
            });
            app.appendChild(container);
        }

        function showResult() {
            orb.classList.remove('orb-breathing');
            orb.style.width = '100vw'; orb.style.height = '100vh'; orb.style.opacity = '0.12'; orb.style.borderRadius = '0';
            
            const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]).slice(0, 4);
            app.innerHTML = `<div class="final-frame"><h2 style="text-align:center; color:var(--accent); margin-bottom:35px;">ТВІЙ РЕЗУЛЬТАТ</h2><div id="res-list"></div></div>`;
            const list = document.getElementById('res-list');
            
            sorted.forEach(([name, val]) => {
                const perc = Math.round((val/80)*100);
                const data = resultsData[name] || {};
                const div = document.createElement('div');
                div.className = 'res-card';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:800; font-size:20px;">${name}</span>
                        <span style="color:var(--accent); font-weight:800; font-size:22px;">${perc}% <span class="arrow">▼</span></span>
                    </div>
                    <div class="details">
                        <p><strong>Твій скіл:</strong> ${data.skill}</p>
                        <p><strong>Реалізм:</strong> ${data.real}</p>
                        <p><strong>Вплив:</strong> ${data.impact}</p>
                        <a href="${data.link}" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:bold;">Детальніше про сферу →</a>
                    </div>
                `;
                div.onclick = () => {
                    const d = div.querySelector('.details');
                    const isOpen = d.style.display === 'block';
                    d.style.display = isOpen ? 'none' : 'block';
                    div.classList.toggle('active', !isOpen);
                };
                list.appendChild(div);
            });

            setTimeout(() => {
                document.getElementById('feedback-popup').classList.add('show');
            }, 10000);
        }
        render();
    </script>
</body>
</html>
